<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Consultoría Fiscal — Sergi Cebreiro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    body {
      background: linear-gradient(0deg, #3f75a3 0%, #172740 100%);
      min-height: 100vh;
      color: #ffffff;
      font-family: 'DM Sans', sans-serif;
    }
    h1, h2, h3 { font-family: 'Poppins', sans-serif; }
    .video-wrapper {
      position: relative;
      width: 100%;
      padding-bottom: 56.25%;
      height: 0;
      overflow: hidden;
      border-radius: 1rem;
    }
    .video-wrapper iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: 0;
    }
    .btn-primary {
      background-color: #4576ff;
      color: #ffffff;
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 1rem 2.5rem;
      border-radius: 20px;
      display: inline-block;
      text-align: center;
      transition: background-color 0.2s ease, transform 0.1s ease;
      text-decoration: none;
    }
    .btn-primary:hover {
      background-color: #3060e0;
      transform: translateY(-1px);
    }
    .badge {
      color: #a3cbe5;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }
    .subtext { color: #a3cbe5; }
  </style>
</head>
<body>

  <section class="max-w-5xl mx-auto px-6 py-20 grid grid-cols-1 lg:grid-cols-2 gap-16 items-center">

    <!-- Izquierda: promesa + botón -->
    <div class="flex flex-col gap-6">

      <span class="badge">Consultoría Fiscal · Sergi Cebreiro</span>

      <!-- PROMESA: reemplazar este texto con la promesa final del cliente -->
      <h1 class="text-5xl font-black leading-tight">
        Optimizá tu <span style="color:#4576ff;">situación fiscal</span> hoy mismo
      </h1>

      <p class="text-lg subtext">
        Somos especialistas en derecho fiscal y tributario. Reducí tu carga impositiva de forma legal y segura.
      </p>

      <!-- BOTÓN DE PAGO: reemplazar href con el link de GHL/Stripe -->
      <a href="REEMPLAZAR_CON_LINK_DE_PAGO" class="btn-primary">
        CONTRATAR CONSULTORÍA →
      </a>

      <p class="text-sm subtext" style="opacity:0.6;">Pago seguro · Acceso inmediato</p>

    </div>

    <!-- Derecha: video del CEO -->
    <div>
      <!-- VIDEO: reemplazar VIDEO_ID con el ID real de YouTube o Vimeo -->
      <div class="video-wrapper" style="box-shadow: 0 25px 50px rgba(0,0,0,0.5); outline: 1px solid rgba(255,255,255,0.08);">
        <iframe
          src="https://www.youtube.com/embed/VIDEO_ID?rel=0&modestbranding=1"
          title="Consultoría fiscal con Sergi Cebreiro"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; picture-in-picture"
          allowfullscreen
        ></iframe>
      </div>
      <p class="mt-3 text-center text-sm subtext" style="opacity:0.6;">Sergi Cebreiro · CEO Zona Fiscal</p>
    </div>

  </section>

</body>
</html>
